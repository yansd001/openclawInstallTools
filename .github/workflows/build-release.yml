name: Build & Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号 (例如 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "OpenClawInstaller" `
            --add-data "installer.py;." `
            --add-data "gui.py;." `
            --version-file version_info.txt `
            main.py

      - name: Package ZIP
        run: Compress-Archive -Path dist/OpenClawInstaller.exe -DestinationPath dist/OpenClawInstaller-v${{ github.event.inputs.version }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: OpenClaw Installer v${{ github.event.inputs.version }}
          body: |
            ## OpenClaw 安装配置工具 v${{ github.event.inputs.version }}

            Windows 可执行文件，双击即可运行，无需安装 Python。

            ### 使用方法
            1. 下载 `OpenClawInstaller-v${{ github.event.inputs.version }}.zip`
            2. 解压到任意目录
            3. 双击 `OpenClawInstaller.exe` 运行

            ### ⚠️ Windows 安全提示
            由于程序未进行商业代码签名，Windows 可能弹出安全警告：

            **如果提示"智能应用控制已阻止可能不安全的应用"：**
            1. 右键点击 `OpenClawInstaller.exe` → **属性**
            2. 在底部勾选 **"解除锁定"** → 点击 **确定**
            3. 重新双击运行即可

            **如果提示"Windows 已保护你的电脑"（SmartScreen）：**
            1. 点击 **"更多信息"**
            2. 点击 **"仍要运行"**
          files: |
            dist/OpenClawInstaller.exe
            dist/OpenClawInstaller-v${{ github.event.inputs.version }}.zip
          draft: false
          prerelease: false
